# configs/inference_seg.yaml
# --------------------------
# Base config for seg_inference.py — the segmentation twin of inference_depth.yaml.
#
# Loads a trained segmentation-conditioned LoRAdapter checkpoint and generates
# images conditioned on the LIVE SegFormer-b5-Cityscapes segmentation of each input.
#
# HOW IT WORKS:
#   - SegmentationEncoder (the seg encoder) runs automatically inside model.sample()
#     (sample_easy calls encoder(c) — no skip_encode), so segmentation is computed
#     LIVE at inference. You do NOT need pre-computed maps at inference time.
#   - The preprocess used here (build_seg_square_preprocess in seg_inference.py) is
#     IDENTICAL to the one used by seg_map_calculations.py, guaranteeing that
#     the live seg map matches the saved training map (train/inference parity).
#
# USAGE — from a JSON manifest (recommended):
#   python seg_inference.py \
#       ckpt_path=outputs/train/seg/runs/YYYY-MM-DD/HH-MM-SS/checkpoint-3000 \
#       inference.json_file=data/seg_training/test.jsonl \
#       inference.output_dir=results/seg
#
# USAGE — single image:
#   python seg_inference.py \
#       ckpt_path=outputs/train/seg/runs/YYYY-MM-DD/HH-MM-SS/checkpoint-3000 \
#       "inference.images=[data/raw/000417/raw_image.jpg]" \
#       "inference.prompts=['driving in rain at night']" \
#       inference.output_dir=results/seg
#
# OUTPUT (per input image):
#   results/seg/
#       raw_image_grid.jpg        ← 4-panel: ORIGINAL | SEG MAP | PREDICTED | RAW SEG GEN
#       raw_image_original.jpg
#       raw_image_seg.jpg         ← SegFormer-b5 colour conditioning map
#       raw_image_predicted.jpg
#       raw_image_raw_seg_gen.jpg ← same seg, empty prompt (pure seg adherence)

defaults:
  - model: sd15
  - lora@lora.struct: struct
  - override /lora/encoder@lora.struct.encoder: segformer   # live SegFormer-b5 (was midas)
  - _self_

# ---- Checkpoint -----------------------------------------------------------
# Path to the checkpoint directory produced by seg_training.py.
# Structure expected:  <ckpt_path>/struct/lora-checkpoint.pt
#                      <ckpt_path>/struct/mapper-checkpoint.pt
ckpt_path: ???     # e.g. outputs/train/seg/runs/2024-01-01/00-00-00/checkpoint-3000

# ---- Global resolution (must match training) ------------------------------
size: 512          # square canvas; must match what training/calc used
seed: 42

# =============================================================================
# MODEL LOADING — LOCAL vs INTERNET  (one switch: local_files_only)
# =============================================================================
# MUST match how the model was set during training so inference uses the same
# base + seg model (references.md §3 parity rule).
# Both the local folder AND the hub id are listed; the flag picks which.
#   local_files_only: true   -> use LOCAL folders (*_model_path), offline.
#   local_files_only: false  -> use HUB ids (*_model_name); download if missing.
# The choice is made in seg_inference.py (reads this flag, sets model.model_name
# / encoder.model before the model is built). Local paths are relative to the repo
# root; the code makes them absolute.
local_files_only: true

base_model_name:  runwayml/stable-diffusion-v1-5
base_model_path:  checkpoints/local_models/stable-diffusion-v1-5

# LOCKED MODEL: b5 (references.md §9). Must match the model used during training.
seg_model_name: nvidia/segformer-b5-finetuned-cityscapes-1024-1024
seg_model_path: checkpoints/local_models/segformer-b5-cityscapes

# ---- Base diffusion model -------------------------------------------------
model:
  model_name: ${base_model_name}   # default; seg_inference.py overrides to base_model_path when local_files_only=true

# ---- LoRA (inference mode — weights not updated) --------------------------
lora:
  struct:
    optimize: false   # frozen at inference
    encoder:
      # LIVE seg encoder at inference — same model the training maps were computed with.
      model: ${seg_model_name}   # default; seg_inference.py overrides to seg_model_path when local_files_only=true

# ---- Inference parameters -------------------------------------------------
inference:
  # Input — choose ONE:
  images:    []         # list of image paths, e.g. ["data/raw/000417/raw_image.jpg"]
  json_file: null       # OR path to JSON manifest (raw_image_path + prompt per entry)

  prompts:   []         # prompts for 'images' list mode; leave empty to use JSON prompts

  # Output:
  output_dir: outputs/inference/seg/results     # relative to repo root (resolved in seg_inference.py)
  save_generated_only: false   # true → save only predicted image, mirroring folder structure

  # Preprocessing:
  resize_mode: letterbox       # letterbox (default) | stretch — squaring before encoder
                               # Must match the mode used in seg_map_calculations.py

  # Generation:
  n_samples:           1    # number of generated images per input image
  num_inference_steps: 50   # diffusion denoising steps
  guidance_scale:      7.5  # CFG scale

hydra:
  run:
    dir: outputs/inference/seg/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: true
