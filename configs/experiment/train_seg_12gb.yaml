# @package _global_
#
# SEGMENTATION training (12 GB). Twin of train_depth_12gb.yaml — every training
# setting is held IDENTICAL to depth so depth-vs-seg results are comparable. The
# ONLY differences are the ones segmentation genuinely requires:
#   • encoder  : segformer  (was: midas)
#   • data     : local_seg + seg_training/*.json  (was: local_depth + depth_training)
#   • two grid knobs wired (n_grid_images, grid_include_empty_prompt) — monitoring
#     only, does NOT affect the trained model, so the comparison stays valid.
# Anything that differs from depth is flagged inline with "DIFF:".

defaults:
  - /lora@lora.struct: struct
  - override /lora/encoder@lora.struct.encoder: segformer   # DIFF: seg encoder (was midas)
  - override /model: sd15
  - override /data: local_seg                                # DIFF: seg data module (was local_depth)
  - _self_

# =============================================================================
# MODEL SELECTION & HARDWARE  (identical to depth_12gb)
# =============================================================================
gradient_checkpointing: true
gradient_accumulation_steps: 4
size: 512

# =============================================================================
# 1. GENERAL TRAINING PARAMETERS  (identical to depth_12gb)
# =============================================================================
learning_rate: 1.0e-4
lr_warmup_steps: 500
lr_scheduler: cosine

# NOTE (inherited from depth_12gb, references.md depth open-issue (2)): these look
# like leftover quick-test values that contradict the dataset math in the comments
# (which imply epochs:5, val_steps:1000). Kept IDENTICAL to depth on purpose so the
# two runs match; raise both for a real run (do it for depth too, to stay comparable).
epochs: 1
val_steps: 100
ckpt_steps: 100

# =============================================================================
# 2. DATA  (DIFF: seg manifests; structure identical to depth)
# =============================================================================
#   JSON keys read by SegJsonDataset (src/data/local_seg.py):
#     "raw_image_path" -> source RGB image
#     "seg_path"       -> pre-computed class-ID PNG (run calculate_segmentation_map.py)
#     "prompt"         -> text caption
data:
  batch_size: 4
  workers: 4
  val_workers: 2
  json_file:     seg_training/train.json    # DIFF: was depth_training/... via data/train.json
  val_json_file: seg_training/val.json      # real val set — NEVER test.json

# =============================================================================
# 3. GLOBAL FALLBACK PROMPT  (identical to depth)
# =============================================================================
use_empty_prompt_eval: false
prompt: null

# =============================================================================
# 4. OPERATIONAL SETTINGS  (identical to depth, plus the two seg grid knobs)
# =============================================================================
n_samples: 1
seed: 42
val_batches: 8
save_grid: true

# DIFF (monitoring only): the grid knobs depth left hardcoded are exposed here.
n_grid_images: 2              # fixed validation scenes per checkpoint grid (rows)
grid_include_empty_prompt: true   # render the 4th empty-prompt panel per row

# =============================================================================
# 5. PRECISION  (identical to depth)
# =============================================================================
bf16: true
ignore_check: true
log_cond: true
tag: seg_12gb

# =============================================================================
# 6. MODEL OVERRIDES  (identical to depth)
# =============================================================================
model:
  _target_: src.model.SD15
  pipeline_type: diffusers.StableDiffusionPipeline
  model_name: "runwayml/stable-diffusion-v1-5"
  local_files_only: false
  guidance_scale: 7.5

# =============================================================================
# 7. LORA ARCHITECTURE  (rank/c_dim/adaption_mode IDENTICAL to depth: 128/128/only_res_conv)
# =============================================================================
lora:
  struct:
    optimize: true
    cfg: false
    ckpt_path: null
    encoder:                                  # DIFF: SegFormer encoder block (was DepthEstimator)
      _target_: src.encoders.seg_encoder.SegmentationEncoder
      model: "nvidia/segformer-b0-finetuned-cityscapes-1024-1024"
      size: ${size}
      local_files_only: false
    config:
      adaption_mode: only_res_conv
      rank: 128
      c_dim: 128
      lora_scale: 1

local_files_only: false
