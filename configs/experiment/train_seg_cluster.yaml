# @package _global_
#
# SEGMENTATION training (multi-GPU cluster). Twin of train_depth_cluster.yaml;
# all training settings held IDENTICAL to depth for a fair comparison. Only the
# seg-required differences are present (flagged "DIFF:").
#
# MULTI-GPU LAUNCH (4× 90 GB-class GPU):
#   accelerate launch --num_processes=4 train_seg.py experiment=train_seg_cluster

defaults:
  - /lora@lora.struct: struct
  - override /lora/encoder@lora.struct.encoder: segformer   # DIFF: seg encoder (was midas)
  - override /model: sd15
  - override /data: local_seg                                # DIFF: seg data module
  - _self_

gradient_checkpointing: false
gradient_accumulation_steps: 1
size: 512

learning_rate: 2.0e-4
lr_warmup_steps: 150
lr_scheduler: cosine

epochs: 5
val_steps: 200
ckpt_steps: 500

data:
  batch_size: 16
  workers: 8
  val_workers: 4
  json_file:     seg_training/train.json    # DIFF: seg manifests
  val_json_file: seg_training/val.json      # real val set — NEVER test.json

use_empty_prompt_eval: false
prompt: null

n_samples: 1
seed: 42
val_batches: 8
save_grid: true

# DIFF (monitoring only): seg grid knobs.
n_grid_images: 2
grid_include_empty_prompt: true

bf16: true
ignore_check: true
log_cond: true
tag: seg_cluster

model:
  _target_: src.model.SD15
  pipeline_type: diffusers.StableDiffusionPipeline
  model_name: "runwayml/stable-diffusion-v1-5"
  local_files_only: false
  guidance_scale: 7.5

lora:
  struct:
    optimize: true
    cfg: false
    ckpt_path: null
    encoder:                                  # DIFF: SegFormer encoder block
      _target_: src.encoders.seg_encoder.SegmentationEncoder
      model: "nvidia/segformer-b0-finetuned-cityscapes-1024-1024"
      size: ${size}
      local_files_only: false
    config:
      adaption_mode: only_res_conv
      rank: 128
      c_dim: 128
      lora_scale: 1

local_files_only: false
